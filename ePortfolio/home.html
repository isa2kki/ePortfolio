<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="/favicon.png">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta charset="UTF-8">
    <title>Isaiah</title>
    <style>
    body {  
        margin: 15;
        background-image: url("images/YumeBG3.png");
        background-position: center;
        height: 130vh;
        color: white;
        text-align: center;
        font-family: 'Lexend', sans-serif;
    }
    .bg-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0,0,0,0.3);
        z-index: -1;
    }

    @font-face {
        font-family: Yume2kki;
        src: url('yummy nickels.ttf');
    }

    /* Top title */
    #header-img {
        margin-bottom: 0px;
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .img-frame {
        width: 200px;
        height: 200px;
        padding: 15px;
        
        margin: 0 auto;

        border: 20px solid transparent;
        border-image: url("images/2kkiborder2.png") 35 stretch;
        background-color: black;

        overflow: hidden; /* important */
    }

    #title {
        font-family: Yume2kki;
        margin-top: 0px;
        font-size: 2em;   
    }

    /* Main box */
    .container {
        width: 60%;
        height: 90vh;
        margin: 20px auto;
        display: flex;
        background: #302749;
        overflow: hidden;
    }

    /* Left tabs */
    .tabs {
        width: 225px;
        background-image: url("images/YumeBG3.png");
        display: flex;
        flex-direction: column;
        border: 20px solid transparent;
        border-image: url("images/2kkiBorder.png") 35 stretch;
    }

    .tabs button {
        font-family: Yume2kki;
        font-size: 15pt;
        padding: 15px;
        margin-top: 10px;
        border: none;
        background: none;
        color: white;
        cursor: pointer;
        text-align: center;
        /*flex: 1; */
        transition: 0.2s;
    }

    @keyframes glowPulse {
        0% {
            box-shadow: 0 0 5px #ffffff;
        }
        50% {
            box-shadow: 0 0 20px #ffffff;
        }
        100% {
            box-shadow: 0 0 5px #ffffff;
    }
    }

    .tabs button:hover {
        animation: glowPulse 1.5s infinite;
        transform: scale(1.05);
    }

    .tabs button.active {
        outline: 3px solid rgba(255, 255, 255, 0.8);
        outline-offset: 2px;
        animation: glowPulse 2s infinite;
    }

    /* Right content */
    .content {
        flex: 1;
        padding: 20px;
        overflow-y: auto; /* THIS makes it scroll */
        text-align: left;
        border: 20px solid transparent;
        border-image: url("images/2kkiBorder.png") 35 stretch;
    }

    h2 {
        background: black;
        color: white;
        box-shadow: 0 0 0 4px #888;
        margin-bottom: 100px;

        border: 6px solid #cfcfcf; /* outer border */
        padding: 30px;

        text-align: center;
        font-size: 25px;
        font-family: lexend;
    }

    p {
        background: black;
        color: white;
        box-shadow: 0 0 0 4px #888;
        margin-bottom: 50px;

        border: 6px solid #cfcfcf; /* outer border */
        padding: 20px;

        text-align: center;
        font-size: 20px;
        font-family: lexend;
    }

    a {
        color: #8c00ff;
        text-decoration: none;
        font-size: 20px;
    }

    .img-decoration {
        width: 80%;
        display: block;
        margin: auto;
    }

    .img-row {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
    }

    .img-link {
        width: 120px;
        height: auto;
        transition: 0.2s;
        cursor: pointer;
    }
    .img-link:hover {
        transform: scale(1.1);
        opacity: 1;  
    }

    @media (max-width: 768px) {
        body {
            height: auto;
        }
        .container {
            width: 100%;
            height: auto;
            margin: 20px auto;
        }
        .img-frame {
            width: 55px;
            height: 55px;
            padding: 10px;
            
            margin: 0 auto;

            border: 16px solid transparent;
            border-image: url("images/2kkiborder2.png") 35 stretch;
            background-color: black;

            overflow: hidden; /* important */
        }
        .img-decoration {
            width: 100%;
        }
        .tabs {
            width: 50px;
            background-image: url("images/YumeBG3.png");
            display: flex;
            flex-direction: column;
            border: 15px solid transparent;
            border-image: url("images/2kkiBorder.png") 35 stretch;
        }
        .tabs button {
            font-family: Yume2kki;
            font-size: 5pt;
            padding: 5px;
            margin-top: 10px;
            text-align: center;
            /*flex: 1; */
        }
        .tabs button.active {
            outline: 3px solid rgba(255, 255, 255, 0.8);
            outline-offset: 2px;
            animation: glowPulse 2s infinite;
        }
        .content {
            flex: 1;
            padding: 10px;
            border: 15px solid transparent;
            border-image: url("images/2kkiBorder.png") 35 stretch;
        }
        #title {
            margin-top: 5px;
            font-size: 1em;
        }
        a {
            font-size: 5px;
        }
        p {
            background: black;
            color: white;
            box-shadow: 0 0 0 2px #888;
            margin-bottom: 15px;

            border: 3px solid #cfcfcf; /* outer border */
            padding: 5px;
            font-size: 5px;
        }
        h2 {
            background: black;
            color: white;
            box-shadow: 0 0 0 2px #888;
            margin-bottom: 25px;

            border: 3px solid #cfcfcf; /* outer border */
            padding: 10px;
            font-size: 7px;
        }
        img {
            max-width: 150px;

            height: auto;
        }
        .img-link {
            width: 40px;
            height: auto;
            transition: 0.2s;
            cursor: pointer;
        }
    }
    
    </style>
</head>

<div class="img-frame">
    <img id="header-img" src="">
</div>

<div class="img-decoration"></div>

<div class="img-link"></div>

<div class="bg-overlay"></div>

<h1 id="title">Welcome!</h1>

<div class="container">

    <div class="tabs">
        <button onclick="showTab('about me', 'Welcome!', 'images/Yumehop.png')">About me</button>
        <button onclick="showTab('revision', 'Revision', 'images/Yumetired.png')">Revision</button>
        <button onclick="showTab('artifacts', 'Artifacts', 'images/UroCat.png')">Artifacts</button>
        <button onclick="showTab('reflection', 'reflection', 'images/UroCat.png')">Reflection</button>
        <button onclick="showTab('contact me', 'Contact me', 'images/UroCat.png')">Contact me</button>
    </div>

    <div class="content">
        <div id="about me" class="tab-content">
            <h2>My name is Isaiah Lindsey, I am a double major in Computer Science and Sports Management at FSU.</h2>
            <img src="images/UroBoat.gif" class="img-decoration">
        </div>

        <div id="revision" class="tab-content" style="display:none;">
            <h2>I will revise my Rhetorical Rationale.</h2>
        </div>        

        <div id="artifacts" class="tab-content" style="display:none;">
            <h2>Stuff I am currently working on, or plan to work on</h2>
        </div>     

        <div id="reflection" class="tab-content" style="display:none;">
            <h2>Stuff I am currently working on, or plan to work on</h2>
        </div>     

        <div id="contact me" class="tab-content" style="display:none;">
            <h2>Some places you can find me</h2>
            <div class="img-row">
                <a href="https://www.instagram.com/itsstillisa/" target="_blank">
                    <img src="images/Instagram.png" alt="My Instagram!" class="img-link">
                </a>
                <a href="https://github.com/isa2kki" target="_blank">
                    <img src="images/github.png" alt="My github account" class="img-link">
                </a>
                <a href="mailto:2007iml@gmail.com" target="_blank">
                    <img src="images/Gmail.png" alt="My email" class="img-link">
                </a>
            </div>
        </div>
      
    </div>

<script>
function showTab(tabId, titleText, imgSrc) {
    let tabs = document.getElementsByClassName("tab-content");
    let buttons = document.querySelectorAll(".tabs button");

    for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.display = "none";
    }

    buttons.forEach(btn => btn.classList.remove("active"));

    document.getElementById(tabId).style.display = "block";

    event.target.classList.add("active");

    document.getElementById("title").innerText = titleText;
    document.getElementById("header-img").src = imgSrc;
}
</script>
</div>
